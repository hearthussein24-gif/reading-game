workflows:
  android-workflow:
    name: HATY Android Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Ensure Android platform files exist
        script: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android --org com.haty --project-name haty_reading_game .
          fi
          echo "flutter.compileSdkVersion=36" >> android/local.properties
          echo "flutter.targetSdkVersion=36" >> android/local.properties
      - name: Get Flutter packages
        script: flutter pub get && find "$HOME/.pub-cache" -path "*/flutter_tts-*/android/build.gradle" -exec sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 36/' {} \;
      - name: Build debug APK (for quick install/testing)
        script: flutter build apk --debug
      - name: Build release APK
        script: flutter build apk --release
      - name: Build release AAB (for Play Store)
        script: flutter build appbundle --release
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
